name: Tự động cập nhật dữ liệu World Cup 2026

on:
  schedule:
    - cron: '0 * * * *' # Cứ đúng 60 phút hệ thống sẽ tự chạy kích hoạt Robot một lần
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào bạn muốn

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi trực tiếp cho tiến trình
    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v3

    - name: Cài đặt môi trường Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Chạy Robot lấy tin tức mới nhất
      run: python update_data.py

    - name: Tự động lưu dữ liệu mới và đẩy lên GitHub Pages
      run: |
        git config --global user.name "GitHub Robot"
        git config --global user.email "robot@github.com"
        
        # Kiểm tra xem file data.json có tồn tại và có thay đổi không
        git add data.json
        
        # Nếu không có thay đổi gì, thoát êm đẹp không báo lỗi
        if git diff-index --quiet HEAD --; then
          echo "Không có dữ liệu mới để cập nhật. Hoàn thành nhiệm vụ!"
          exit 0
        fi
        
        # Nếu có thay đổi, tiến hành tạo bản lưu
        git commit -m "Cập nhật dữ liệu kết quả WC 2026 mới nhất [Skip CI]"
        
        # Tự động lấy tên nhánh hiện tại (main hoặc master) để đẩy lên, tránh ghi đè sai nhánh
        CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        
        # Đẩy dữ liệu lên bằng token bảo mật an toàn
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:$CURRENT_BRANCH
